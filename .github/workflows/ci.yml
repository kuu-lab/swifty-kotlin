name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  jscpd-check:
    name: Duplicate Code Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install jscpd
        run: npm install -g jscpd@4.0.8
      - name: Run jscpd
        run: jscpd --threshold 5.6 --min-lines 15 --format swift Sources/
      # RF-GUARD-002: Tests/ の重複監視（2026-06-10 実測 4.21% に対し閾値 5.0、
      # 段階的引き下げは RF-GOV-001）
      - name: Run jscpd (Tests)
        run: jscpd --threshold 5.0 --min-lines 15 --format swift Tests/
      - name: jscpd reproduce hint on failure
        if: failure()
        run: |
          {
            echo '## jscpd reproduce'
            echo '```bash'
            echo 'npm install -g jscpd@4.0.8'
            echo 'jscpd --threshold 5.6 --min-lines 15 --format swift Sources/'
            echo 'jscpd --threshold 5.0 --min-lines 15 --format swift Tests/'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h
      - name: Setup Swift and LLVM
        uses: ./.github/actions/setup-swift-llvm
        with:
          swift-version: "6.2"
      - name: Cache SPM build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-swift-6.2-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-swift-6.2-
      - name: Show toolchain versions
        run: swift --version
      - name: Build with strict concurrency (warnings)
        run: swift build -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency
      - name: Run smoke tests
        env:
          SWIFT_TEST_PARALLEL: "4"
        run: bash Scripts/swift_test.sh --filter SmokeTests -Xswiftc -swift-version -Xswiftc 6
      - name: Smoke test reproduce hint
        if: always()
        run: |
          {
            echo '## Smoke test reproduce'
            echo '```bash'
            echo 'SWIFT_TEST_PARALLEL=4 bash Scripts/swift_test.sh --filter SmokeTests -Xswiftc -swift-version -Xswiftc 6'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  full-swift-tests:
    name: Full Swift Tests (${{ matrix.test-target }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - test-target: CompilerCoreTests
            test-filter: '^CompilerCoreTests\\.'
            workers: "8"
            build-jobs: "8"
          - test-target: RuntimeTests
            test-filter: '^RuntimeTests\\.'
            workers: "4"
            build-jobs: "4"
          - test-target: RuntimeTestsParallel
            test-filter: '^RuntimeTestsParallel\\.'
            workers: "4"
            build-jobs: "4"
          - test-target: KSwiftKCLITests
            test-filter: '^KSwiftKCLITests\\.'
            workers: "4"
            build-jobs: "4"
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h
      - name: Setup Swift and LLVM
        uses: ./.github/actions/setup-swift-llvm
        with:
          swift-version: "6.2"
      - name: Cache SPM build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-swift-6.2-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-swift-6.2-
      - name: Show toolchain versions
        run: swift --version
      - name: Build with strict concurrency (warnings)
        run: swift build -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency
      - name: Run full Swift test suite for ${{ matrix.test-target }}
        env:
          SWIFT_TEST_WORKERS: "${{ matrix.workers }}"
          SWIFT_TEST_BUILD_JOBS: "${{ matrix.build-jobs }}"
        run: bash Scripts/swift_test.sh --filter "${{ matrix.test-filter }}" -Xswiftc -swift-version -Xswiftc 6
      - name: Full test reproduce hint
        if: always()
        run: |
          {
            echo '## Full Swift test reproduce (${{ matrix.test-target }})'
            echo '```bash'
            echo "SWIFT_TEST_WORKERS=${{ matrix.workers }} SWIFT_TEST_BUILD_JOBS=${{ matrix.build-jobs }} bash Scripts/swift_test.sh --filter \"${{ matrix.test-filter }}\" -Xswiftc -swift-version -Xswiftc 6"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  diff-regression-shards:
    name: kotlinc Diff Regression Shard (${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    # Kotlin/Java tool downloads occasionally spike on GitHub-hosted runners.
    timeout-minutes: 60
    strategy:
      # Run every shard even if one fails so we get a complete picture per PR.
      fail-fast: false
      matrix:
        # 714 diff cases striped across N runners. Cases are split interleaved
        # (case i runs when i % DIFF_SHARD_COUNT == shard) by
        # Scripts/diff_kotlinc.sh, so each shard gets a balanced cost mix.
        # shard values MUST be a contiguous 0..N-1 range. DIFF_SHARD_COUNT is
        # derived from strategy.job-total below, so just editing this list
        # resizes the split — the divisor can never drift out of sync.
        shard: [0, 1, 2, 3]
    env:
      KOTLIN_VERSION: "2.3.10"
      KOTLINX_COROUTINES_VERSION: "1.10.2"
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h
      - name: Setup Swift and LLVM
        uses: ./.github/actions/setup-swift-llvm
        with:
          swift-version: "6.2"
      - name: Cache Kotlin compiler and coroutines jar
        id: cache-kotlin
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/kotlin-tools
          key: kotlin-tools-${{ env.KOTLIN_VERSION }}-coroutines-${{ env.KOTLINX_COROUTINES_VERSION }}
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install Kotlin compiler and coroutines jar
        run: |
          TOOLS_DIR="${RUNNER_TEMP}/kotlin-tools"
          KOTLIN_DIR="${TOOLS_DIR}/kotlin"
          mkdir -p "$TOOLS_DIR"

          if [ ! -f "${KOTLIN_DIR}/kotlinc/bin/kotlinc" ]; then
            curl -sSL -o "${TOOLS_DIR}/kotlin-compiler.zip" \
              "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/kotlin-compiler-${KOTLIN_VERSION}.zip"
            unzip -q "${TOOLS_DIR}/kotlin-compiler.zip" -d "$KOTLIN_DIR"
          fi
          echo "${KOTLIN_DIR}/kotlinc/bin" >> "$GITHUB_PATH"

          if [ ! -f "${TOOLS_DIR}/kotlinx-coroutines-core-jvm.jar" ]; then
            curl -sSL -o "${TOOLS_DIR}/kotlinx-coroutines-core-jvm.jar" \
              "https://repo1.maven.org/maven2/org/jetbrains/kotlinx/kotlinx-coroutines-core-jvm/${KOTLINX_COROUTINES_VERSION}/kotlinx-coroutines-core-jvm-${KOTLINX_COROUTINES_VERSION}.jar"
          fi
          echo "KOTLINC_CLASSPATH=${TOOLS_DIR}/kotlinx-coroutines-core-jvm.jar" >> "$GITHUB_ENV"
      - name: Cache SPM build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-swift-6.2-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-swift-6.2-
      - name: Verify prerequisites
        run: |
          java -version
          kotlinc -version
          test -f "$KOTLINC_CLASSPATH"
      - name: Build compiler
        run: swift build -Xswiftc -swift-version -Xswiftc 6
      - name: Run kotlinc diff regression cases
        id: diff_kotlinc
        continue-on-error: true
        env:
          DIFF_REPORT: ${{ runner.temp }}/diff_kotlinc_report.tsv
          DIFF_ARTIFACT_ROOT: ${{ runner.temp }}/diff_kotlinc_artifacts
          DIFF_COMPILE_TIMEOUT: "180"
          DIFF_RUN_TIMEOUT: "30"
          DIFF_LOG_PASS: "0"
          DIFF_SHARD_INDEX: ${{ matrix.shard }}
          # Derived from the matrix size (number of shard jobs) so the shard
          # list and the divisor stay in lockstep automatically.
          DIFF_SHARD_COUNT: ${{ strategy.job-total }}
        run: |
          NCPU=$(nproc)
          DIFF_PARALLEL="$NCPU" DIFF_WORKERS="$NCPU" \
            bash Scripts/diff_kotlinc.sh --report "$DIFF_REPORT" Scripts/diff_cases
      - name: Summarize kotlinc diff artifacts
        if: always() && steps.diff_kotlinc.outcome != 'cancelled'
        env:
          DIFF_REPORT: ${{ runner.temp }}/diff_kotlinc_report.tsv
        run: bash Scripts/diff_kotlinc_ci_summary.sh --report "$DIFF_REPORT"
      - name: Fail when kotlinc diff regression mismatches exist
        if: steps.diff_kotlinc.outcome == 'failure'
        run: |
          echo "kotlinc diff regression cases failed." >&2
          exit 1
      - name: Upload kotlinc diff failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kotlinc-diff-regression-${{ github.run_id }}-shard${{ matrix.shard }}
          path: |
            ${{ runner.temp }}/diff_kotlinc_report.tsv
            ${{ runner.temp }}/diff_kotlinc_artifacts
          if-no-files-found: ignore
          retention-days: 30

  # Stable aggregate gate: keeps a single "kotlinc Diff Regression" status check
  # regardless of how many shards run, so branch protection rules don't need to
  # list each shard. Succeeds only when every shard succeeded.
  diff-regression:
    name: kotlinc Diff Regression
    runs-on: ubuntu-latest
    needs: diff-regression-shards
    if: always()
    steps:
      - name: Verify all shards passed
        run: |
          result="${{ needs.diff-regression-shards.result }}"
          echo "Aggregate shard result: $result"
          if [[ "$result" != "success" ]]; then
            echo "One or more kotlinc diff regression shards did not pass." >&2
            exit 1
          fi
