name: CI

on:
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

# Successive pushes to the same PR cancel all in-flight verification jobs.
# Non-PR events get a unique group per run and are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Hosted TODO ID duplicate check. Gating once TODO.md duplicate IDs are cleaned up.
  verify-todo-ids:
    name: Verification 0/5 (TODO ID duplicate check)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Check for duplicate TODO task IDs
        run: bash Scripts/check_todo_ids.sh

  # Hosted CompilerCore and kotlinc-diff shards build in independent
  # workspaces. Verification 2-4 deliberately shares one self-hosted build so
  # that the expensive SwiftPM products are reused within that lane.
  verify-core:
    name: Verification 1/5 (CompilerCore and Smoke, shard ${{ matrix.shard_label }}/3)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - shard_index: 0
            shard_label: 1
          - shard_index: 1
            shard_label: 2
          - shard_index: 2
            shard_label: 3
    steps:
      - uses: actions/checkout@v7
      - name: Setup Swift
        uses: ./.github/actions/setup-swift
        with:
          swift-version: "6.3"
      - name: Show toolchain versions
        run: swift --version
      - name: Configure CompilerCore test parallelism
        run: |
          worker_count="$(sysctl -n hw.logicalcpu 2>/dev/null || getconf _NPROCESSORS_ONLN)"
          if ! [[ "$worker_count" =~ ^[1-9][0-9]*$ ]]; then
            echo "Unable to detect a positive logical CPU count: $worker_count" >&2
            exit 1
          fi
          {
            echo "SWIFT_TEST_BUILD_JOBS=$worker_count"
            echo "SWIFT_TEST_WORKERS=$worker_count"
            echo "SWT_EXPERIMENTAL_MAXIMUM_PARALLELIZATION_WIDTH=$worker_count"
          } >> "$GITHUB_ENV"
          echo "CompilerCore parallelization width: $worker_count"
      - name: Build compiler and tests
        run: bash Scripts/build_swift_tests.sh -j "$SWIFT_TEST_BUILD_JOBS" -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency
      - name: Run smoke tests with strict concurrency warnings
        if: matrix.shard_index == 0
        env:
          SWIFT_TEST_PARALLEL: "1"
        run: bash Scripts/swift_test.sh --skip-build --filter SmokeTests -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency
      - name: Run CompilerCoreTests shard with strict concurrency warnings
        run: |
          bash Scripts/shard_swift_tests.sh \
            --mode static --tests-dir Tests/CompilerCoreTests --target-prefix CompilerCoreTests \
            --shard-index "${{ matrix.shard_index }}" --shard-count 3 \
            -- --skip '^CompilerCoreTests\.FrontendParallelBenchmarkTests/' \
            -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency
      - name: Run CompilerCore frontend benchmarks separately
        if: matrix.shard_index == 0
        env:
          SWIFT_TEST_PARALLEL: "0"
        run: |
          bash Scripts/swift_test.sh --skip-build --filter '^CompilerCoreTests\.FrontendParallelBenchmarkTests/' \
            -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency
      - name: Reproduce hints
        if: always()
        run: |
          {
            echo "## Verification 1/5 reproduce (shard ${{ matrix.shard_label }}/3)"
            echo '```bash'
            echo "worker_count=\"\$(sysctl -n hw.logicalcpu 2>/dev/null || getconf _NPROCESSORS_ONLN)\""
            echo "SWIFT_TEST_BUILD_JOBS=\"\$worker_count\" bash Scripts/build_swift_tests.sh -j \"\$worker_count\" -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency"
            if [[ "${{ matrix.shard_index }}" == "0" ]]; then
              echo "SWIFT_TEST_PARALLEL=1 SWIFT_TEST_WORKERS=\"\$worker_count\" SWIFT_TEST_BUILD_JOBS=\"\$worker_count\" SWT_EXPERIMENTAL_MAXIMUM_PARALLELIZATION_WIDTH=\"\$worker_count\" bash Scripts/swift_test.sh --skip-build --filter SmokeTests -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency"
              echo "SWIFT_TEST_PARALLEL=0 SWIFT_TEST_BUILD_JOBS=\"\$worker_count\" bash Scripts/swift_test.sh --skip-build --filter '^CompilerCoreTests\\.FrontendParallelBenchmarkTests/' -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency"
            fi
            echo "SWIFT_TEST_WORKERS=\"\$worker_count\" SWIFT_TEST_BUILD_JOBS=\"\$worker_count\" SWT_EXPERIMENTAL_MAXIMUM_PARALLELIZATION_WIDTH=\"\$worker_count\" bash Scripts/shard_swift_tests.sh --mode static --tests-dir Tests/CompilerCoreTests --target-prefix CompilerCoreTests --shard-index ${{ matrix.shard_index }} --shard-count 3 -- --skip '^CompilerCoreTests\\.FrontendParallelBenchmarkTests/' -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  verify-self-hosted:
    name: Verification 2-4/5 (Backend, Runtime, CLI, LSP, and Repository Checks)
    runs-on: self-hosted
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v7
      - name: Setup Swift
        uses: ./.github/actions/setup-swift
        with:
          swift-version: "6.3"
      - name: Show toolchain versions
        run: swift --version
      - name: Build compiler and tests
        env:
          SWIFT_TEST_BUILD_JOBS: "4"
        run: bash Scripts/build_swift_tests.sh -j "$SWIFT_TEST_BUILD_JOBS" -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency
      # With one shared lane there is no need to list every concrete XCTest
      # method for cross-job sharding. Suite-level static filters also ensure
      # test-discovery failures cannot be mistaken for an empty test set.
      - name: Run CompilerBackendTests with strict concurrency warnings
        env:
          SWIFT_TEST_WORKERS: "4"
          SWIFT_TEST_BUILD_JOBS: "4"
        run: |
          bash Scripts/shard_swift_tests.sh \
            --mode static --tests-dir Tests/CompilerBackendTests --target-prefix CompilerBackendTests \
            -- -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency
      - name: Run RuntimeTests (serialized, chunked) with strict concurrency warnings
        env:
          SWIFT_TEST_PARALLEL: "0"
          SWIFT_TEST_BUILD_JOBS: "4"
        run: |
          bash Scripts/shard_swift_tests.sh \
            --mode static --tests-dir Tests/RuntimeTests --target-prefix RuntimeTests \
            -- -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency
      - name: Run RuntimeTestsParallel with strict concurrency warnings
        env:
          SWIFT_TEST_PARALLEL: "1"
          SWIFT_TEST_WORKERS: "4"
          SWIFT_TEST_BUILD_JOBS: "4"
        run: bash Scripts/swift_test.sh --skip-build --filter '^RuntimeTestsParallel\.' -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency
      - name: Run KSwiftKCLITests with strict concurrency warnings
        env:
          SWIFT_TEST_PARALLEL: "1"
          SWIFT_TEST_WORKERS: "4"
          SWIFT_TEST_BUILD_JOBS: "4"
        run: bash Scripts/swift_test.sh --skip-build --filter '^KSwiftKCLITests\.' -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency
      - name: Run LSPServerTests with strict concurrency warnings
        env:
          SWIFT_TEST_PARALLEL: "1"
          SWIFT_TEST_WORKERS: "4"
          SWIFT_TEST_BUILD_JOBS: "4"
        run: bash Scripts/swift_test.sh --skip-build --filter '^LSPServerTests\.' -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency
      - name: Generate loc report
        run: |
          mkdir -p "$RUNNER_TEMP/refactoring-metrics"
          bash Scripts/loc_report.sh | tee "$RUNNER_TEMP/refactoring-metrics/loc_report.tsv"
      - name: Summarize loc report
        run: |
          {
            echo '## Refactoring metrics'
            echo
            echo '```tsv'
            cat "$RUNNER_TEMP/refactoring-metrics/loc_report.tsv"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload loc report artifact
        uses: actions/upload-artifact@v7
        with:
          name: refactoring-metrics-${{ github.run_id }}
          path: ${{ runner.temp }}/refactoring-metrics/loc_report.tsv
          if-no-files-found: error
          retention-days: 30
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install jscpd
        run: |
          jscpd_prefix="$RUNNER_TEMP/jscpd"
          for attempt in 1 2 3; do
            if npm install --prefix "$jscpd_prefix" --no-save jscpd@4.0.8; then
              echo "$jscpd_prefix/node_modules/.bin" >> "$GITHUB_PATH"
              exit 0
            fi
            echo "Attempt $attempt failed, retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done
          echo "npm install failed after 3 attempts" >&2
          exit 1
      - name: Run jscpd
        run: jscpd --threshold 5.6 --min-lines 15 --format swift Sources/
      - name: Observe jscpd report (Sources and Tests)
        run: |
          report_dir="$(mktemp -d)"
          jscpd --config .jscpd.json --silent --reporters json --output "$report_dir" --exitCode 0
          node - "$report_dir/jscpd-report.json" <<'NODE'
          const fs = require("fs");
          const reportPath = process.argv[2];
          const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
          const total = report.statistics.total;
          const lines = [
            "## jscpd observed duplication (Sources + Tests)",
            "",
            "| Metric | Value |",
            "|---|---:|",
            `| Files | ${total.sources} |`,
            `| Lines | ${total.lines} |`,
            `| Clones | ${total.clones} |`,
            `| Duplicated lines | ${total.duplicatedLines} |`,
            `| Duplicated line % | ${total.percentage}% |`,
            `| Duplicated tokens | ${total.duplicatedTokens} |`,
            `| Duplicated token % | ${total.percentageTokens}% |`,
          ];
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join("\n")}\n`);
          console.log(
            `jscpd observed duplication: ${total.clones} clones, ${total.duplicatedLines} duplicated lines (${total.percentage}%)`
          );
          NODE
      - name: Reproduce hints
        if: always()
        run: |
          {
            echo '## Verification 2-4/5 reproduce'
            echo '```bash'
            echo 'bash Scripts/build_swift_tests.sh -j 4 -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency'
            echo 'SWIFT_TEST_WORKERS=4 SWIFT_TEST_BUILD_JOBS=4 bash Scripts/shard_swift_tests.sh --mode static --tests-dir Tests/CompilerBackendTests --target-prefix CompilerBackendTests -- -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency'
            echo 'SWIFT_TEST_PARALLEL=0 SWIFT_TEST_BUILD_JOBS=4 bash Scripts/shard_swift_tests.sh --mode static --tests-dir Tests/RuntimeTests --target-prefix RuntimeTests -- -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency'
            echo "SWIFT_TEST_PARALLEL=1 SWIFT_TEST_WORKERS=4 SWIFT_TEST_BUILD_JOBS=4 bash Scripts/swift_test.sh --skip-build --filter '^RuntimeTestsParallel\\.' -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency"
            echo "SWIFT_TEST_PARALLEL=1 SWIFT_TEST_WORKERS=4 SWIFT_TEST_BUILD_JOBS=4 bash Scripts/swift_test.sh --skip-build --filter '^KSwiftKCLITests\\.' -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency"
            echo "SWIFT_TEST_PARALLEL=1 SWIFT_TEST_WORKERS=4 SWIFT_TEST_BUILD_JOBS=4 bash Scripts/swift_test.sh --skip-build --filter '^LSPServerTests\\.' -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency"
            echo 'npm install --prefix "$RUNNER_TEMP/jscpd" --no-save jscpd@4.0.8'
            echo 'jscpd --threshold 5.6 --min-lines 15 --format swift Sources/'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  verify-diff:
    name: Verification 5/5 (kotlinc Diff, shard ${{ matrix.shard_label }}/3)
    runs-on: ubuntu-latest
    timeout-minutes: 150
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - shard_index: 0
            shard_label: 1
          - shard_index: 1
            shard_label: 2
          - shard_index: 2
            shard_label: 3
    env:
      KOTLIN_VERSION: "2.3.10"
      KOTLINX_COROUTINES_VERSION: "1.10.2"
    steps:
      - uses: actions/checkout@v7
      - name: Setup Swift
        uses: ./.github/actions/setup-swift
        with:
          swift-version: "6.3"
      - name: Show toolchain versions
        run: swift --version
      - name: Build compiler and tests
        env:
          SWIFT_TEST_BUILD_JOBS: "4"
        run: bash Scripts/build_swift_tests.sh -j "$SWIFT_TEST_BUILD_JOBS" -Xswiftc -swift-version -Xswiftc 6 -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency
      - name: Cache Kotlin compiler and coroutines jar
        id: cache-kotlin
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/kotlin-tools
          key: kotlin-tools-${{ env.KOTLIN_VERSION }}-coroutines-${{ env.KOTLINX_COROUTINES_VERSION }}
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Install Kotlin compiler and coroutines jar
        run: |
          TOOLS_DIR="${RUNNER_TEMP}/kotlin-tools"
          KOTLIN_DIR="${TOOLS_DIR}/kotlin"
          mkdir -p "$TOOLS_DIR"

          if [ ! -f "${KOTLIN_DIR}/kotlinc/bin/kotlinc" ]; then
            curl -sSL -o "${TOOLS_DIR}/kotlin-compiler.zip" \
              "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/kotlin-compiler-${KOTLIN_VERSION}.zip"
            unzip -q "${TOOLS_DIR}/kotlin-compiler.zip" -d "$KOTLIN_DIR"
          fi
          echo "${KOTLIN_DIR}/kotlinc/bin" >> "$GITHUB_PATH"

          if [ ! -f "${TOOLS_DIR}/kotlinx-coroutines-core-jvm.jar" ]; then
            curl -sSL -o "${TOOLS_DIR}/kotlinx-coroutines-core-jvm.jar" \
              "https://repo1.maven.org/maven2/org/jetbrains/kotlinx/kotlinx-coroutines-core-jvm/${KOTLINX_COROUTINES_VERSION}/kotlinx-coroutines-core-jvm-${KOTLINX_COROUTINES_VERSION}.jar"
          fi
          echo "KOTLINC_CLASSPATH=${TOOLS_DIR}/kotlinx-coroutines-core-jvm.jar" >> "$GITHUB_ENV"
      - name: Verify prerequisites
        run: |
          java -version
          kotlinc -version
          test -f "$KOTLINC_CLASSPATH"
      - name: Run kotlinc diff regression cases
        id: diff_kotlinc
        continue-on-error: true
        env:
          DIFF_REPORT: ${{ runner.temp }}/diff_kotlinc_report.tsv
          DIFF_ARTIFACT_ROOT: ${{ runner.temp }}/diff_kotlinc_artifacts
          DIFF_COMPILE_TIMEOUT: "180"
          DIFF_RUN_TIMEOUT: "30"
          DIFF_LOG_PASS: "0"
        run: |
          DIFF_WORKERS="$(nproc)" \
            bash Scripts/diff_kotlinc.sh \
              --shard-index "${{ matrix.shard_index }}" --shard-count 3 \
              --report "$DIFF_REPORT" Scripts/diff_cases
      - name: Summarize kotlinc diff artifacts
        if: always() && steps.diff_kotlinc.outcome != 'cancelled'
        env:
          DIFF_REPORT: ${{ runner.temp }}/diff_kotlinc_report.tsv
        run: bash Scripts/diff_kotlinc_ci_summary.sh --report "$DIFF_REPORT"
      - name: Fail when kotlinc diff regression mismatches exist
        if: steps.diff_kotlinc.outcome == 'failure'
        run: |
          echo "kotlinc diff regression cases failed." >&2
          exit 1
      - name: Upload kotlinc diff failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: kotlinc-diff-regression-${{ github.run_id }}-shard-${{ matrix.shard_label }}
          path: |
            ${{ runner.temp }}/diff_kotlinc_report.tsv
            ${{ runner.temp }}/diff_kotlinc_artifacts
          if-no-files-found: ignore
          retention-days: 30
