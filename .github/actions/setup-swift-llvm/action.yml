name: Setup Swift and LLVM (Ubuntu)
description: Install Swift toolchain and LLVM dev packages; set C_INCLUDE_PATH and LIBRARY_PATH for the job.

inputs:
  swift-version:
    description: Swift version string for SwiftyLab/setup-swift
    required: false
    default: "6.2"

runs:
  using: composite
  steps:
    - name: Install Swift
      uses: SwiftyLab/setup-swift@v1
      with:
        swift-version: ${{ inputs.swift-version }}
    - name: Disable unrelated flaky apt sources
      shell: bash
      run: |
        # GitHub-hosted Ubuntu images include Microsoft apt sources that are not
        # needed for this project. If those external repos return invalid
        # InRelease payloads, apt-get update fails before Ubuntu's llvm-dev can
        # be installed.
        for source in \
          /etc/apt/sources.list.d/azure-cli.list \
          /etc/apt/sources.list.d/azure-cli.sources \
          /etc/apt/sources.list.d/microsoft-prod.list \
          /etc/apt/sources.list.d/microsoft-prod.sources \
          /etc/apt/sources.list.d/packages-microsoft-com-prod.list \
          /etc/apt/sources.list.d/packages-microsoft-com-prod.sources
        do
          if [ -f "$source" ]; then
            sudo mv "$source" "${source}.disabled"
          fi
        done
    - name: Install LLVM
      shell: bash
      run: |
        # Runner images preinstall unrelated third-party apt sources (e.g. packages.microsoft.com
        # for azure-cli/dotnet, dl.google.com for the preinstalled Chrome browser) that this job
        # never uses. Their signing/mirrors occasionally break ("Clearsigned file isn't valid",
        # "File has unexpected size") and would otherwise fail `apt-get update` entirely, even
        # though we only need packages from the standard Ubuntu archive. Disable them first so a
        # third-party outage can't block installing llvm-dev.
        sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/google-chrome.list
        sudo apt-get update && sudo apt-get install -y llvm-dev
    - name: Configure LLVM paths
      shell: bash
      run: |
        LLVM_PREFIX="$(llvm-config --prefix)"
        echo "C_INCLUDE_PATH=${LLVM_PREFIX}/include" >> "$GITHUB_ENV"
        echo "LIBRARY_PATH=${LLVM_PREFIX}/lib" >> "$GITHUB_ENV"
        # Find the LLVM library and set KSWIFTK_LLVM_DYLIB
        LLVM_LIB=$(find ${LLVM_PREFIX}/lib -name "libLLVM*.so" 2>/dev/null | head -1)
        if [ -n "$LLVM_LIB" ]; then
          echo "KSWIFTK_LLVM_DYLIB=${LLVM_LIB}" >> "$GITHUB_ENV"
        else
          # Fallback to common library names
          for lib in libLLVM.so libLLVM-19.so libLLVM-18.so libLLVM-17.so libLLVM-16.so libLLVM-15.so; do
            if [ -f "${LLVM_PREFIX}/lib/${lib}" ]; then
              echo "KSWIFTK_LLVM_DYLIB=${LLVM_PREFIX}/lib/${lib}" >> "$GITHUB_ENV"
              break
            fi
          done
        fi
